name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://ozon:ozon@127.0.0.1:55432/ozon_rust_suite

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ozon_rust_suite
          POSTGRES_USER: ozon
          POSTGRES_PASSWORD: ozon
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U ozon -d ozon_rust_suite"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Stage Linux sidecar for Tauri tests
        run: |
          cargo build -p ozon-local-node
          mkdir -p apps/local-node/src-tauri/binaries
          cp target/debug/ozon-local-node apps/local-node/src-tauri/binaries/ozon-local-node-x86_64-unknown-linux-gnu

      - name: Test workspace
        run: cargo test --workspace

  frontend:
    name: Frontend builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portal, admin, and local UI
        run: pnpm build:web
