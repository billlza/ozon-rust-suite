server {
    listen 80;
    server_name ozon66.com www.ozon66.com cn.ozon66.com;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store";
        return 200 "ok\n";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # NOTE: Content-Security-Policy intentionally omitted. A correct CSP must allowlist
        # the exact per-deployment origins (mainland: api-cn.ozon66.com, nebula-cn.ozon66.com,
        # downloads.ozon66.com; global build additionally: Cloudflare Turnstile, Stripe,
        # Supabase) and be validated live, or it will silently break OAuth/captcha/payment.
        try_files /index.html =404;
    }

    location = /auth/callback {
        add_header Cache-Control "no-store";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # NOTE: Content-Security-Policy intentionally omitted. A correct CSP must allowlist
        # the exact per-deployment origins (mainland: api-cn.ozon66.com, nebula-cn.ozon66.com,
        # downloads.ozon66.com; global build additionally: Cloudflare Turnstile, Stripe,
        # Supabase) and be validated live, or it will silently break OAuth/captcha/payment.
        try_files /index.html =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /openclaw/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # NOTE: Content-Security-Policy intentionally omitted. A correct CSP must allowlist
        # the exact per-deployment origins (mainland: api-cn.ozon66.com, nebula-cn.ozon66.com,
        # downloads.ozon66.com; global build additionally: Cloudflare Turnstile, Stripe,
        # Supabase) and be validated live, or it will silently break OAuth/captcha/payment.
        try_files $uri $uri/ /index.html;
    }
}
