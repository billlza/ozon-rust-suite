services:
  - type: web
    name: ozon66-cloud-api
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: OZON_SUITE_BIND
        value: 0.0.0.0:10000
      - key: OZON_SUITE_ENV
        value: production
      - key: DATABASE_URL
        # Managed in the Render dashboard. The original free `ozon66-postgres` database
        # expired (free Postgres lasts 30 days); cloud-api now points at its replacement
        # `ozon66-postgres-2`, set directly in the dashboard. `sync: false` keeps this
        # value dashboard-authoritative so a Blueprint re-sync can't revert it to the
        # deleted database. cloud-api runs `sqlx::migrate!` on startup, so a fresh empty
        # database is provisioned automatically.
        sync: false
      - key: OZON_SUITE_CORS_ALLOWED_ORIGINS
        value: https://ozon66.com,https://www.ozon66.com
      - key: OZON_SUITE_JWT_SECRET
        generateValue: true
      - key: OZON_SUITE_ADMIN_TOKEN
        generateValue: true
      - key: OZON_SUITE_SKYBRIDGE_API_BASE_URL
        value: https://hloqytmhjludmuhwyyzb.supabase.co/functions/v1
      - key: OZON_SUITE_LOCAL_NODE_RELEASE_MANIFEST_URL
        value: https://github.com/billlza/ozon-rust-suite-downloads/releases/latest/download/release-manifest.json
      - key: OZON_SUITE_OPENCLAW_PLUGIN_URL
        value: https://github.com/billlza/ozon-rust-suite-downloads/releases/latest/download/openclaw-plugin.zip
      - key: OZON_SUITE_OPENCLAW_MANIFEST_URL
        value: https://ozon66.com/openclaw/manifest.json
      - key: OZON_SUITE_ALLOW_LOCAL_NEBULA_REGISTRATION
        # Enables customer self-registration via cloud-api email + password (/auth/register),
        # the self-contained login that does not depend on the enterprise SSO identity provider.
        value: "true"
      - key: OZON_SUITE_PAYMENT_PROVIDER
        value: manual
      - key: OZON_SUITE_STRIPE_SECRET_KEY
        sync: false
      - key: OZON_SUITE_STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OZON_SUITE_STRIPE_SUCCESS_URL
        value: https://ozon66.com/?checkout=success#console
      - key: OZON_SUITE_STRIPE_CANCEL_URL
        value: https://ozon66.com/?checkout=cancelled#console
      - key: OZON_SUITE_STRIPE_CURRENCY
        value: cny
      - key: OZON_SUITE_STRIPE_STANDARD_30D_AMOUNT_MINOR
        value: "4000"
      - key: OZON_SUITE_WECHAT_API_BASE_URL
        value: https://api.mch.weixin.qq.com
      - key: OZON_SUITE_WECHAT_APP_ID
        sync: false
      - key: OZON_SUITE_WECHAT_MCH_ID
        sync: false
      - key: OZON_SUITE_WECHAT_MERCHANT_SERIAL_NO
        sync: false
      - key: OZON_SUITE_WECHAT_MERCHANT_PRIVATE_KEY_PEM
        sync: false
      - key: OZON_SUITE_WECHAT_API_V3_KEY
        sync: false
      - key: OZON_SUITE_WECHATPAY_PUBLIC_KEY_ID
        sync: false
      - key: OZON_SUITE_WECHATPAY_PUBLIC_KEY_PEM
        sync: false
      - key: OZON_SUITE_WECHAT_NOTIFY_URL
        value: https://api.ozon66.com/webhooks/wechatpay
      - key: OZON_SUITE_WECHAT_CURRENCY
        value: CNY
      - key: OZON_SUITE_WECHAT_STANDARD_30D_AMOUNT_MINOR
        value: "4000"
      - key: OZON_SUITE_TEST_FULL_ACCESS_IDENTITIES
        # Managed in the Render dashboard, never committed. Leave unset to disable the
        # test-full-access grant entirely. (H1: removed hardcoded identity from VCS.)
        sync: false
      - key: OZON_SUITE_TEST_FULL_ACCESS_DURATION_DAYS
        value: "365"
      - key: OZON_SUITE_TEST_FULL_ACCESS_MAX_DEVICES
        value: "10"
      - key: OZON_SUITE_LEASE_SIGNING_PRIVATE_KEY_PEM
        sync: false
      - key: OZON_SUITE_LEASE_SIGNING_KEY_ID
        value: ozon66-local-node-v1
      - key: OZON_SUITE_LEASE_ISSUER
        value: ozon66-cloud
      - key: OZON_SUITE_LEASE_AUDIENCE
        value: ozon-rust-local-node
      - key: RUST_LOG
        value: ozon_cloud_api=info,tower_http=info,axum=info

databases:
  - name: ozon66-postgres
    databaseName: ozon_rust_suite
    user: ozon
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    ipAllowList: []
